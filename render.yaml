services:
  - name: backend
    type: web
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5

  - name: frontend
    type: static
    env: static
    buildCommand: "corepack enable && corepack prepare pnpm@10.27.0 --activate && pnpm install && pnpm run build"
    publishPath: dist
